<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podgląd Mobilny Live</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="control-panel">
        <input type="text" id="urlInput" class="url-input" placeholder="Wpisz adres URL np. https://pl.wikipedia.org" value="https://pl.m.wikipedia.org">
        <button onclick="loadPage()" class="load-btn">Zobacz</button>
    </div>

    <div class="phone-container">
        <div class="phone-notch"></div>
        <div class="phone-status-bar">
            <span>09:41</span>
            <span>🔋 100%</span>
        </div>
        
        <div id="placeholder" class="placeholder-message">
            Wpisz adres URL powyżej i kliknij "Zobacz", aby załadować podgląd strony.
        </div>
        
        <iframe id="previewIframe" class="preview-iframe" src="https://pl.m.wikipedia.org"></iframe>
    </div>

    <script>
        function loadPage() {
            const input = document.getElementById('urlInput').value.trim();
            const iframe = document.getElementById('previewIframe');
            const placeholder = document.getElementById('placeholder');
            
            if (!input) return;

            let url = input;
            
            // Automatyczne dodawanie https:// jeśli użytkownik zapomni protokołu
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }

            // Ukryj komunikat pomocniczy po kliknięciu
            placeholder.style.display = 'none';
            
            // Jeśli użytkownik wpisze Wikipedię, ładujemy ją bezpośrednio (działa szybciej)
            if (url.includes('wikipedia.org')) {
                iframe.src = url;
            } else {
                // Dla pozostałych stron używamy publicznego proxy, które wycina nagłówki blokujące i usuwa błąd CORS/X-Frame-Options
                iframe.src = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
            }
        }

        // Umożliwia zatwierdzenie adresu klawiszem Enter
        document.getElementById('urlInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                loadPage();
            }
        });
    </script>

</body>
</html>
